name: Create Jira Ticket from GitHub Issue

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  create-jira-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Create Jira Issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          echo "Creating Jira ticket..."

          ISSUE_BODY=$(echo "${{ github.event.issue.body }}" | head -c 5000 | jq -Rs .)
          ISSUE_URL="${{ github.event.issue.html_url }}"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --arg project_key "$JIRA_PROJECT_KEY" \
              --arg summary "${{ github.event.issue.title }}" \
              --arg url "$ISSUE_URL" \
              --argjson body "$ISSUE_BODY" \
              '{
                fields: {
                  project: { key: $project_key },
                  summary: $summary,
                  description: {
                    type: "doc",
                    version: 1,
                    content: [
                      {
                        type: "paragraph",
                        content: [
                          { type: "text", text: "GitHub Issue: " },
                          { type: "text", text: $url, marks: [{ type: "link", attrs: { href: $url } }] }
                        ]
                      },
                      {
                        type: "paragraph",
                        content: [
                          { type: "text", text: $body }
                        ]
                      }
                    ]
                  },
                  issuetype: { name: "Task" }
                }
              }')" \
            $JIRA_BASE_URL/rest/api/3/issue)

          echo "$RESPONSE"

          if [[ "$RESPONSE" != *"HTTP_STATUS:201"* ]]; then
            echo "❌ Failed to create Jira ticket"
            exit 1
          fi

          echo "✅ Jira ticket created successfully"
