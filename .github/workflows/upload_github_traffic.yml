name: Upload GitHub Traffic to Logstash

on:
  schedule:
    # Runs daily at 06:00 UTC (GitHub traffic data updates ~daily)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  upload-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and upload GitHub traffic data
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_GITHUB_TOKEN }}
          LOGSTASH_ENDPOINT: ${{ secrets.LOGSTASH_ENDPOINT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python scripts/upload_github_traffic.py
